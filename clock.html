<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .clock-display {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .date-display {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 10px;
        }

        .utc-offset {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 15px;
        }

        .day-night {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .day-night.day {
            background: #FFD700;
            color: #333;
        }

        .day-night.night {
            background: #1a1a2e;
            color: #FFD700;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            margin: 5px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .format-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .format-btn.active {
            background: white;
            color: #667eea;
        }

        .format-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .world-map {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            text-align: center;
        }

        .world-map h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .timezone-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            text-align: left;
        }

        .timezone-info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .clock-display {
                font-size: 2.2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Multi-Timezone Digital Clock</h1>
            <p>Real-time clock for cities around the world</p>
        </div>

        <div class="format-toggle">
            <button class="format-btn active" onclick="setFormat('24h')">24-Hour</button>
            <button class="format-btn" onclick="setFormat('12h')">12-Hour</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="controls">
            <button class="btn" onclick="addClock()">➕ Add Timezone</button>
            <button class="btn" onclick="resetClocks()">🔄 Reset</button>
        </div>

        <div class="world-map">
            <h3>📍 Timezone Information</h3>
            <div class="timezone-info" id="timezoneInfo"></div>
        </div>
    </div>

    <script>
        // List of timezones to display
        const defaultTimezones = [
            { name: 'New York', timezone: 'America/New_York', emoji: '🗽' },
            { name: 'London', timezone: 'Europe/London', emoji: '🇬🇧' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo', emoji: '🗾' },
            { name: 'Sydney', timezone: 'Australia/Sydney', emoji: '🦘' },
            { name: 'Dubai', timezone: 'Asia/Dubai', emoji: '🏜️' },
            { name: 'Singapore', timezone: 'Asia/Singapore', emoji: '🏙️' },
        ];

        const allTimezones = [
            { name: 'New York', timezone: 'America/New_York', emoji: '🗽' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles', emoji: '🎬' },
            { name: 'Chicago', timezone: 'America/Chicago', emoji: '🏙️' },
            { name: 'Toronto', timezone: 'America/Toronto', emoji: '🍁' },
            { name: 'Mexico City', timezone: 'America/Mexico_City', emoji: '🌮' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo', emoji: '🇧🇷' },
            { name: 'London', timezone: 'Europe/London', emoji: '🇬🇧' },
            { name: 'Paris', timezone: 'Europe/Paris', emoji: '🇫🇷' },
            { name: 'Berlin', timezone: 'Europe/Berlin', emoji: '🇩🇪' },
            { name: 'Moscow', timezone: 'Europe/Moscow', emoji: '🇷🇺' },
            { name: 'Dubai', timezone: 'Asia/Dubai', emoji: '🏜️' },
            { name: 'Delhi', timezone: 'Asia/Kolkata', emoji: '🇮🇳' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok', emoji: '🇹🇭' },
            { name: 'Singapore', timezone: 'Asia/Singapore', emoji: '🏙️' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong', emoji: '🏙️' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo', emoji: '🗾' },
            { name: 'Sydney', timezone: 'Australia/Sydney', emoji: '🦘' },
            { name: 'Auckland', timezone: 'Pacific/Auckland', emoji: '🇳🇿' },
        ];

        let currentTimezones = [...defaultTimezones];
        let timeFormat = '24h';

        function updateClocks() {
            const gridHtml = currentTimezones.map((tz, index) => {
                const time = new Date().toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    hour12: timeFormat === '12h',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const date = new Date().toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                const hour = new Date().toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    hour: '2-digit',
                    hour12: false
                });

                const isDaytime = hour >= 6 && hour < 18;

                const offset = getUTCOffset(tz.timezone);

                return `
                    <div class="clock-card" onclick="removeClock(${index})">
                        <div class="timezone-name">${tz.emoji} ${tz.name}</div>
                        <div class="clock-display">${time}</div>
                        <div class="date-display">${date}</div>
                        <div class="utc-offset">${offset}</div>
                        <span class="day-night ${isDaytime ? 'day' : 'night'}">
                            ${isDaytime ? '☀️ Day' : '🌙 Night'}
                        </span>
                    </div>
                `;
            }).join('');

            document.getElementById('clocksGrid').innerHTML = gridHtml;
            updateTimezoneInfo();
        }

        function getUTCOffset(timezone) {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                timeZoneName: 'longOffset'
            });
            const parts = formatter.formatToParts(new Date());
            const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
            return tzName;
        }

        function setFormat(format) {
            timeFormat = format;
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateClocks();
        }

        function addClock() {
            const availableTimezones = allTimezones.filter(tz => 
                !currentTimezones.some(ctz => ctz.timezone === tz.timezone)
            );

            if (availableTimezones.length === 0) {
                alert('All timezones are already added!');
                return;
            }

            const tz = availableTimezones[Math.floor(Math.random() * availableTimezones.length)];
            currentTimezones.push(tz);
            updateClocks();
        }

        function removeClock(index) {
            if (currentTimezones.length > 1) {
                currentTimezones.splice(index, 1);
                updateClocks();
            } else {
                alert('At least one clock must be displayed!');
            }
        }

        function resetClocks() {
            currentTimezones = [...defaultTimezones];
            updateClocks();
        }

        function updateTimezoneInfo() {
            const info = currentTimezones.map(tz => {
                const offset = getUTCOffset(tz.timezone);
                return `<div class="timezone-info-item"><strong>${tz.name}</strong><br>${offset}</div>`;
            }).join('');
            document.getElementById('timezoneInfo').innerHTML = info;
        }

        // Update clocks every second
        setInterval(updateClocks, 1000);

        // Initial update
        updateClocks();
    </script>
</body>
</html>
